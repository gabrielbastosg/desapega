{% extends 'anuncios/base.html' %}

{% block titulo %}Apagar anúncio — Desapega{% endblock %}

{% block conteudo %}
    <div class="card" style="max-width:480px;">
        <h1 style="margin-top:0;">Apagar anúncio?</h1>
        <p>Tem certeza que quer apagar <strong>{{ anuncio.titulo }}</strong>?
           Essa ação não pode ser desfeita.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sim, apagar</button>
            <a href="{% url 'anuncios:detalhe' anuncio.pk %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
{% endblock %}
