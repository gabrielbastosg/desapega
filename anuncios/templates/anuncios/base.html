{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // Define o tema o quanto antes (escolha salva ou preferência do sistema).
        (function () {
            const salvo = localStorage.getItem('tema');
            const doSistema = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', salvo || doSistema);
        })();
    </script>
    <title>{% block titulo %}Desapega{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'anuncios/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'anuncios/css/anuncios.css' %}">
    <link rel="stylesheet" href="{% static 'anuncios/css/chat.css' %}">
</head>
<body>
    <header>
        <div class="container nav" style="padding-top:0;padding-bottom:0;">
            <a href="{% url 'anuncios:lista' %}" class="logo">🏷️ Desapega</a>
            <nav>
                <button type="button" id="btn-tema" class="btn-tema"
                        title="Alternar tema claro/escuro" aria-label="Alternar tema">🌙</button>
                {% if user.is_authenticated %}
                    <a href="{% url 'anuncios:criar' %}">+ Novo anúncio</a>
                    <a href="{% url 'anuncios:meus' %}">Meus anúncios</a>
                    <a href="{% url 'anuncios:meus_favoritos' %}">Favoritos</a>
                    <a href="{% url 'anuncios:minhas_conversas' %}">Conversas</a>
                    <span class="ola">Olá, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="linkbtn">Sair</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Entrar</a>
                    <a href="{% url 'anuncios:cadastro' %}">Cadastrar</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="container">
        {% block conteudo %}{% endblock %}
    </main>
    <script>
        (function () {
            const btn = document.getElementById('btn-tema');
            const raiz = document.documentElement;
            // mostra o ícone certo pro tema atual (sol = está escuro; lua = está claro)
            const sincronizaIcone = () =>
                btn.textContent = raiz.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
            sincronizaIcone();
            btn.addEventListener('click', function () {
                const novo = raiz.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
                raiz.setAttribute('data-theme', novo);
                localStorage.setItem('tema', novo);
                sincronizaIcone();
            });
        })();
    </script>
</body>
</html>
