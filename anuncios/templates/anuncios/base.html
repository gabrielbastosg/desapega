{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Desapega{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'anuncios/style.css' %}">
</head>
<body>
    <header>
        <div class="container nav" style="padding-top:0;padding-bottom:0;">
            <a href="{% url 'anuncios:lista' %}" class="logo">🏷️ Desapega</a>
            <nav>
                {% if user.is_authenticated %}
                    <a href="{% url 'anuncios:criar' %}">+ Novo anúncio</a>
                    <a href="{% url 'anuncios:meus' %}">Meus anúncios</a>
                    <a href="{% url 'anuncios:minhas_conversas' %}">Conversas</a>
                    <span class="ola">Olá, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="linkbtn">Sair</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Entrar</a>
                    <a href="{% url 'anuncios:cadastro' %}">Cadastrar</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="container">
        {% block conteudo %}{% endblock %}
    </main>
</body>
</html>
